name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: these workflows only read the repo. Fork PRs already get a
# read-only token; this also constrains the token on push/scheduled runs.
permissions:
  contents: read

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
      - name: Run tests
        run: |
          pytest --cov=custom_components.noonlight --cov-report=term-missing
