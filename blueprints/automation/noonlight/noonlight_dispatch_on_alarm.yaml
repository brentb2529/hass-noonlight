blueprint:
  name: "Noonlight: dispatch on alarm trigger"
  description: >
    Request a Noonlight emergency dispatch when an alarm panel is triggered,
    and optionally cancel it if the panel is disarmed during the cancelable
    grace window. Works with any `alarm_control_panel` (Alarmo, Manual,
    AlarmDecoder, and others).


    Tip: if your panel already runs its own entry-delay countdown, leave the
    Noonlight entry delay at 0 so you don't stack two countdowns.
  domain: automation
  author: brentb2529
  source_url: https://github.com/brentb2529/hass-noonlight/blob/scaffold-integration/blueprints/automation/noonlight/noonlight_dispatch_on_alarm.yaml
  input:
    alarm_panel:
      name: Alarm panel
      description: The alarm control panel to watch.
      selector:
        entity:
          filter:
            domain: alarm_control_panel
    dispatch_action:
      name: Dispatch type
      description: Which Noonlight dispatch to request when the alarm triggers.
      default: noonlight.dispatch_police
      selector:
        select:
          options:
            - label: Police
              value: noonlight.dispatch_police
            - label: Fire
              value: noonlight.dispatch_fire
            - label: Medical
              value: noonlight.dispatch_medical
            - label: Police, fire, and medical
              value: noonlight.dispatch_all
    entry_delay:
      name: Entry delay (seconds)
      description: >
        Cancelable grace window before Noonlight actually dispatches. Leave at
        0 if your panel already runs its own entry countdown.
      default: 0
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: seconds
          mode: box
    instructions:
      name: Instructions for responders
      description: >
        Optional free-text context sent to Noonlight (for example, which area
        or sensor tripped). Leave blank to send none.
      default: ""
      selector:
        text:
    account:
      name: Noonlight site
      description: >
        Optional. Only needed when more than one Noonlight site is configured;
        use the config entry title or ID. Leave blank for a single site.
      default: ""
      selector:
        text:
    cancel_on_disarm:
      name: Cancel when disarmed
      description: >
        Cancel the Noonlight dispatch if the panel is disarmed (aborts a
        pending dispatch within the grace window).
      default: true
      selector:
        boolean:

mode: single

variables:
  cancel_on_disarm: !input cancel_on_disarm

triggers:
  - trigger: state
    entity_id: !input alarm_panel
    to: triggered
    id: dispatch
  - trigger: state
    entity_id: !input alarm_panel
    to: disarmed
    id: cancel

actions:
  - choose:
      - conditions:
          - condition: trigger
            id: dispatch
        sequence:
          - alias: "Request the Noonlight dispatch"
            action: !input dispatch_action
            data:
              entry_delay_seconds: !input entry_delay
              instructions: !input instructions
              account: !input account
      - conditions:
          - condition: trigger
            id: cancel
          - condition: template
            value_template: "{{ cancel_on_disarm }}"
        sequence:
          - alias: "Cancel a pending dispatch on disarm"
            action: noonlight.cancel
            data:
              reason: "Alarm panel disarmed"
              account: !input account
